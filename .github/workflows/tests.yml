name: Tests
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    if: true || github.event_name != 'schedule'
    name: ${{ matrix.os }} ${{ matrix.environment }} ${{ matrix.task }}
    runs-on: self-hosted
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest
          environment: py310
          task: test-ci
    steps:
    - name: Checkout source
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Reconfigure pytest-timeout
      if: ${{ matrix.os != 'windows-latest' }}
      run: sed -i.bak 's/timeout_method = "thread"/timeout_method = "signal"/' pyproject.toml
    - uses: prefix-dev/setup-pixi@v0.10.0
      with:
        pixi-version: v0.72.1
        environments: ${{ matrix.environment }}
        cache: true
        locked: true
    - name: Run tests
      id: run_tests
      run: pixi run -e ${{ matrix.environment }} ${{ matrix.task }}
    - name: Coverage
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results
      if: |
        always() && (steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure')
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.os }}-${{ matrix.environment }}-${{ matrix.task }}
        path: pytest.xml
  event_file:
    if: true || github.event_name != 'schedule'
    name: Event File
    runs-on: self-hosted
    steps:
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Event File
        path: ${{ github.event_path }}
    timeout-minutes: 12
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
  push:
    branches:
    - main
    tags:
    - '*'
  pull_request: null
  workflow_dispatch: null
  schedule:
  - cron: 0 6,18 * * *
